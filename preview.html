<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Motexo Repuestos — Catálogo</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f5f5f5;
    --card: #ffffff;
    --line: #e5e5e5;
    --text: #111111;
    --muted: #777777;
    --soft: #999999;
    --brand: #e63000;
    --green: #25D366;
    --warn-bg: #fff8e8;
    --warn-line: #f0d98a;
    --warn-text: #7a5a00;
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: var(--bg);
    color: var(--text);
  }
  .top {
    background: var(--card);
    padding: 14px 16px;
    border-bottom: 1px solid var(--line);
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 30;
  }
  .logo {
    font-size: 16px;
    font-weight: 700;
    letter-spacing: .5px;
  }
  .logo span { color: var(--brand); }
  .cart-pill {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 8px 14px;
    border: 1px solid #ddd;
    border-radius: 999px;
    cursor: pointer;
    font-size: 13px;
    background: #fff;
    white-space: nowrap;
  }
  .search-wrap {
    background: var(--card);
    padding: 12px 16px;
    border-bottom: 1px solid var(--line);
  }
  .search-wrap input {
    width: 100%;
    padding: 12px 14px;
    font-size: 14px;
    border: 1px solid #ddd;
    border-radius: 12px;
    outline: none;
    background: #fafafa;
  }
  .cat-pills {
    display: flex;
    gap: 8px;
    padding: 10px 16px;
    overflow-x: auto;
    background: var(--card);
    border-bottom: 1px solid var(--line);
    position: sticky;
    top: 58px;
    z-index: 20;
  }
  .cat-pills::-webkit-scrollbar { display: none; }
  .cpill {
    padding: 7px 14px;
    border-radius: 999px;
    font-size: 12px;
    border: 1px solid #ddd;
    color: #666;
    cursor: pointer;
    white-space: nowrap;
    background: #fff;
  }
  .cpill.sel {
    border-color: #111;
    color: #111;
    background: #f2f2f2;
    font-weight: 600;
  }
  .results-meta {
    padding: 12px 16px 0;
    font-size: 12px;
    color: var(--muted);
  }
  .prod-list {
    padding: 12px 16px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .prod-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 14px;
    border: 1px solid var(--line);
    border-radius: 12px;
    background: var(--card);
    gap: 10px;
  }
  .prod-row.needs-review {
    border-color: var(--warn-line);
    background: #fffdf6;
  }
  .prod-left {
    flex: 1;
    min-width: 0;
  }
  .prod-name {
    font-size: 13px;
    font-weight: 600;
    line-height: 1.35;
  }
  .prod-meta {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-top: 4px;
    align-items: center;
  }
  .prod-sku {
    font-size: 11px;
    color: var(--soft);
  }
  .prod-tag {
    font-size: 10px;
    color: #555;
    border: 1px solid #e1e1e1;
    padding: 3px 7px;
    border-radius: 999px;
    background: #fafafa;
  }
  .review-dot {
    font-size: 11px;
    color: var(--warn-text);
    border: 1px solid var(--warn-line);
    padding: 3px 7px;
    border-radius: 999px;
    background: var(--warn-bg);
  }
  .prod-price {
    font-size: 13px;
    font-weight: 700;
    white-space: nowrap;
  }
  .qty-ctrl {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .qbtn {
    width: 30px;
    height: 30px;
    border-radius: 8px;
    border: 1px solid #ddd;
    background: #fff;
    font-size: 16px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #111;
  }
  .qbtn.zero { opacity: .35; }
  .qval {
    font-size: 13px;
    min-width: 20px;
    text-align: center;
    font-weight: 600;
  }
  .section-label {
    font-size: 11px;
    color: var(--soft);
    letter-spacing: 1px;
    padding: 12px 16px 4px;
  }
  .cart-section {
    padding: 0 16px 28px;
  }
  .summary {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 14px;
    margin-bottom: 10px;
  }
  .sum-row {
    display: flex;
    justify-content: space-between;
    gap: 10px;
    font-size: 13px;
    color: #555;
    padding: 5px 0;
  }
  .sum-name {
    max-width: 75%;
  }
  .sum-total {
    display: flex;
    justify-content: space-between;
    font-size: 15px;
    font-weight: 700;
    padding-top: 10px;
    margin-top: 6px;
    border-top: 1px solid #eee;
  }
  .empty-msg, .no-results {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 16px;
    color: var(--muted);
    font-size: 13px;
  }
  .no-results {
    text-align: center;
    padding: 28px 16px;
  }
  .wpp-btn {
    width: 100%;
    padding: 15px;
    border-radius: 12px;
    background: var(--green);
    color: #fff;
    border: none;
    cursor: pointer;
    font-size: 15px;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .review-panel {
    margin: 0 16px 30px;
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 14px;
    overflow: hidden;
  }
  .review-head {
    padding: 14px 16px;
    border-bottom: 1px solid #eee;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
  }
  .review-title {
    font-size: 14px;
    font-weight: 700;
  }
  .review-sub {
    font-size: 12px;
    color: var(--muted);
    margin-top: 3px;
  }
  .review-toggle {
    border: 1px solid #ddd;
    background: #fff;
    border-radius: 10px;
    padding: 8px 12px;
    font-size: 12px;
    cursor: pointer;
  }
  .review-body {
    display: none;
  }
  .review-body.open {
    display: block;
  }
  .review-filters {
    padding: 10px 12px 0;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .review-filter-btn {
    border: 1px solid #ddd;
    background: #fff;
    border-radius: 999px;
    padding: 7px 11px;
    font-size: 12px;
    cursor: pointer;
    color: #555;
  }
  .review-filter-btn.active {
    border-color: #111;
    color: #111;
    background: #f3f3f3;
    font-weight: 700;
  }
  .review-list {
    padding: 10px 12px 14px;
  }
  .review-empty {
    padding: 10px 4px;
    font-size: 13px;
    color: var(--muted);
  }
  .review-item {
    border: 1px solid #eee;
    border-radius: 12px;
    padding: 12px;
    margin-bottom: 8px;
    background: #fafafa;
  }
  .review-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 10px;
  }
  .review-name {
    font-size: 13px;
    font-weight: 700;
    line-height: 1.35;
  }
  .review-sku {
    font-size: 11px;
    color: var(--muted);
    margin-top: 4px;
  }
  .review-cat {
    font-size: 11px;
    color: #666;
    border: 1px solid #ddd;
    border-radius: 999px;
    padding: 4px 8px;
    white-space: nowrap;
    background: #fff;
  }
  .review-motivos {
    margin-top: 8px;
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }
  .review-tag {
    font-size: 11px;
    padding: 5px 8px;
    border-radius: 999px;
    background: var(--warn-bg);
    color: var(--warn-text);
    border: 1px solid var(--warn-line);
  }
  .review-original {
    margin-top: 8px;
    font-size: 12px;
    color: #777;
    line-height: 1.45;
  }
  @media (max-width: 680px) {
    .prod-row {
      align-items: flex-start;
      flex-wrap: wrap;
    }
    .prod-price {
      order: 3;
      width: 100%;
      margin-top: -4px;
    }
    .qty-ctrl {
      margin-left: auto;
    }
  }
</style>
</head>

<div class="top">
  <div class="logo">MOTEXO <span>REPUESTOS</span></div>
  <div class="cart-pill" onclick="scrollToCart()">

    <div class="review-filters" id="review-filters"></div>

  </div>
</div>

  "ACEITES",
  "BUJIAS",

  "DIRECCION",

  "MANIJAS",
  "PEDALINES",
  "RETENES",
  "RULEMANES",
  "TRANSMISION",
  "VALVULAS",

];

let cart = {};
let catSel = "Todos";
let reviewFilterCat = "TODAS";

function fmt(n) {
  return Number(n || 0).toLocaleString("es-AR", {
    style: "currency",
    currency: "ARS",
    minimumFractionDigits: 2,
    maximumFractionDigits: 2
  });
}

function escapeHtml(str) {
  return String(str || "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#39;");
}

function norm(s) {
  return String(s || "")
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g, "")
    .toUpperCase()
    .trim();
}

function titleCase(str) {
  return String(str || "").toLowerCase().replace(/\b\w/g, m => m.toUpperCase());
}

function limpiarNombre(nombre, sku = "") {
  let n = String(nombre || "").trim();
  const s = String(sku || "").trim();

  n = n.replace(/^[\/&\-\.,;\s]+/, "");
  n = n.replace(/\s*-\s*/g, " ");
  n = n.replace(/\s+/g, " ").trim();

  if (s) {
    const escapedSku = s.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
    n = n.replace(new RegExp("^" + escapedSku + "\\s+", "i"), "");
  }

  n = n.replace(/^BANDO\s+/i, "CORREA BANDO ");
  n = n.replace(/^BUJIAS?\s+NIPO\s+DENSO(?:\s+JAPON)?/i, "BUJIA DENSO");
  n = n.replace(/^BUJIA\s*NGK\s*/i, "BUJIA NGK ");
  n = n.replace(/^BUJIA\s*DENSO\s*/i, "BUJIA DENSO ");
  n = n.replace(/\bFILTRO ACEITE\b/gi, "FILTRO DE ACEITE");
  n = n.replace(/\bFILTRO AIRE\b/gi, "FILTRO DE AIRE");
  n = n.replace(/\bJUEGO ESPEJOS\b/gi, "JUEGO DE ESPEJOS");
  n = n.replace(/\bKIT JUNTAS MOTOR COMPLETO\b/gi, "KIT DE JUNTAS MOTOR COMPLETO");
  n = n.replace(/\bKIT PISTAS DIRECCION\b/gi, "KIT DE PISTAS DE DIRECCION");
  n = n.replace(/\bKIT PEDALINES DELANTEROS\b/gi, "KIT DE PEDALINES DELANTEROS");
  n = n.replace(/\bKIT PEDALINES TRASEROS\b/gi, "KIT DE PEDALINES TRASEROS");
  n = n.replace(/\bKIT DISCOS EMBRAGUE\b/gi, "KIT DE DISCOS DE EMBRAGUE");
  n = n.replace(/\bJUEGO DISCOS EMBRAGUE\b/gi, "JUEGO DE DISCOS DE EMBRAGUE");
  n = n.replace(/\bKIT RETENES MOTOR\b/gi, "KIT DE RETENES DE MOTOR");
  n = n.replace(/\bKIT CILINDRO PISTON Y AROS PERNO Y SEG STD\b/gi, "KIT DE CILINDRO, PISTON, AROS, PERNO Y SEGUROS STD");
  n = n.replace(/\bKIT PISTON PERNO AROS Y SEGUROS\b/gi, "KIT DE PISTON, PERNO, AROS Y SEGUROS");
  n = n.replace(/\bSET MANIAJ\b/gi, "SET MANIJAS");
  n = n.replace(/\bMANIAJ\b/gi, "MANIJAS");
  n = n.replace(/\bHALOGENA\b/gi, "HALÓGENA");
  n = n.replace(/\bSEMISINTETICO\b/gi, "SEMISINTÉTICO");
  n = n.replace(/\bMOTO 4T PRO\b/gi, "MOTO 4T PRO");
  n = n.replace(/\s*\/\s*/g, " / ");
  n = n.replace(/\bAPLICA A\b/gi, "APLICA A");
  n = n.replace(/\s+/g, " ").trim();

  return n;
}

function detectarCategoria(p) {
  const texto = norm(`${p.sku || ""} ${p.nombre || ""} ${p.cat || ""}`);

  if (texto.includes("ACEITE") || texto.includes("YAMALUBE") || texto.includes("LUBRAX") || /\b\d(1, 2)W\d2\b/.test(texto)) return "ACEITES";
  if (texto.includes("BUJIA")) return "BUJIAS";
  if (texto.includes("CABLE")) return "CABLES";
  if (texto.includes("CORREA")) return "CORREAS";
  if (texto.includes("PISTAS DE DIRECCION") || texto.includes("DIRECCION")) return "DIRECCION";
  if (texto.includes("EMBRAGUE")) return "EMBRAGUE";
  if (texto.includes("ESPEJO")) return "ESPEJOS";
  if (texto.includes("FILTRO")) return "FILTROS";
  if (texto.includes("KIT DE CILINDRO") || texto.includes("KIT CILINDRO")) return "KIT CILINDRO";
  if (texto.includes("KIT DE JUNTAS") || texto.includes("KIT JUNTAS")) return "KIT JUNTAS";
  if (texto.includes("KIT DE PISTON") || texto.includes("KIT PISTON")) return "KIT PISTON";
  if (texto.includes("FARO") || texto.includes("LAMPARA") || texto.includes("LÁMPARA")) return "LAMPARAS";
  if (texto.includes("MANIJA") || texto.includes("MANIJAS")) return "MANIJAS";
  if (texto.includes("PEDALINES")) return "PEDALINES";
  if (texto.includes("RETENES")) return "RETENES";
  if (texto.includes("RULEMAN")) return "RULEMANES";
  if (texto.includes("TRANSMISION")) return "TRANSMISION";
  if (texto.includes("VALVULAS")) return "VALVULAS";

  return "OTROS";
}

function formatearNombrePro(nombre, cat = "") {
  let n = String(nombre || "").trim();
  const c = String(cat || "").trim().toUpperCase();

  n = n.replace(/\bENFIELD\b/gi, "ROYAL ENFIELD");
  n = n.replace(/\bFZFI\b/gi, "FZ FI");
  n = n.replace(/\bFZ16\b/gi, "FZ16");
  n = n.replace(/\bFZ25\b/gi, "FZ25");
  n = n.replace(/\bFZ250\b/gi, "FZ250");
  n = n.replace(/\bRX[\s\-]?100\b/gi, "RX 100");
  n = n.replace(/\bXR ?150\b/gi, "XR150");
  n = n.replace(/\bROUSER 135 LS\b/gi, "ROUSER 135LS");
  n = n.replace(/\bNS200\b/gi, "NS200");
  n = n.replace(/\bPULSAR\b/gi, "PULSAR");
  n = n.replace(/\bRTR\b/gi, "RTR");
  n = n.replace(/\bGIXXER\b/gi, "GIXXER");
  n = n.replace(/\bDOMINAR\b/gi, "DOMINAR");
  n = n.replace(/\bFAZER\b/gi, "FAZER");
  n = n.replace(/\bYBR\b/gi, "YBR");
  n = n.replace(/\bRAY\b/gi, "RAY");

  if (c === "CORREAS" && /^\d+[A-Z]?\s*X\s*\d+/i.test(n)) {
    n = "CORREA " + n;
  }
  if (c === "BUJIAS" && !/^BUJIA\b/i.test(n)) {
    n = "BUJIA " + n;
  }
  if (c === "LAMPARAS") {
    n = n.replace(/\bOFF\s*ROAD\b/gi, "OFF-ROAD");
    n = n.replace(/\bWATERPROOF\b/gi, "WATERPROOF");
  }

  n = n.replace(/\s+/g, " ").trim();
  return n;
}

function autocorregirNombreRoto(nombre, sku = "", cat = "") {
  let n = String(nombre || "").trim();
  const s = String(sku || "").trim();
  const c = String(cat || "").trim().toUpperCase();

  if (s) {
    const escapedSku = s.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
    n = n.replace(new RegExp("\\b" + escapedSku + "\\b", "gi"), "").replace(/\s+/g, " ").trim();
  }

  n = n.replace(/^[\/&\-\.,;\s]+/, "").trim();
  n = n.replace(/\s*\/\s*/g, " / ");
  n = n.replace(/\s+/g, " ").trim();

  if (c === "FILTROS" || c === "KIT JUNTAS" || c === "EMBRAGUE") {
    n = n.replace(/\s+HONDA XR150\b/gi, "").trim();
  }

  if (c === "LAMPARAS") {
    n = n.replace(/\s*-\s*DESPACHO.*$/i, "").trim();
  }

  n = n.replace(/\b(\w+)\s+\1\b/gi, "$1");
  n = n.replace(/\s+\/\s+$/g, "");
  n = n.replace(/\s+/g, " ").trim();
  return n;
}

function requiereRevisionManual(p) {
  const sku = String(p.sku || "").trim();
  const nombre = String(p.nombre || "").trim();
  const cat = String(p.cat || "").trim().toUpperCase();
  const motivos = [];
  const nombreUpper = nombre.toUpperCase();

  const nombresGenericos = [
    "FILTRO DE AIRE",
    "FILTRO DE ACEITE",
    "JUEGO DE ESPEJOS",
    "KIT DE DISCOS DE EMBRAGUE",
    "KIT DE JUNTAS MOTOR COMPLETO",
    "KIT DE RETENES DE MOTOR",
    "KIT DE PISTON, PERNO, AROS Y SEGUROS",
    "KIT DE CILINDRO, PISTON, AROS, PERNO Y SEGUROS STD"
  ];

  if (!nombre) motivos.push("sin nombre");
  if (nombresGenericos.includes(nombreUpper)) motivos.push("nombre genérico");
  if (nombre.length > 90) motivos.push("nombre largo");
  if ((nombre.match(/\//g) || []).length >= 3) motivos.push("muchos /");
  if (/\bWATERPROOF\b|\bIP67\b|\bOFF-?ROAD\b|\bV BELT\b/i.test(nombre)) motivos.push("texto técnico");
  if (sku && nombreUpper.includes(sku.toUpperCase())) motivos.push("sku visible");
  if (/^[\/&\-]/.test(nombre) || /\s{2,}/.test(nombre)) motivos.push("formato sucio");

  const marcas = ["YAMAHA", "HONDA", "SUZUKI", "BAJAJ", "TVS", "KTM", "ROYAL ENFIELD", "GILERA", "ZANELLA", "MOTOMEL"];
  const encontradas = marcas.filter(m => nombreUpper.includes(m));
  if (encontradas.length >= 2) motivos.push("mezcla de marcas");

  if (/HONDA XR150/i.test(nombre) && cat !== "FILTROS") motivos.push("posible aplicación mezclada");

  return [...new Set(motivos)];
}

productos.forEach(p => {
  p.nombreOriginal = p.nombre;
  p.nombre = limpiarNombre(p.nombre, p.sku);
  p.cat = detectarCategoria(p);
  p.nombre = formatearNombrePro(p.nombre, p.cat);
  p.nombre = autocorregirNombreRoto(p.nombre, p.sku, p.cat);
});

const cats = ["Todos", ...ORDEN_CATEGORIAS.filter(cat => productos.some(p => p.cat === cat))];

function buildCats() {
  document.getElementById("cat-pills").innerHTML = cats.map(c =>
    `<div class="cpill${c === catSel ? " sel" : ""}" onclick="selCat(${JSON.stringify(c)})">${escapeHtml(c)}</div>`
  ).join("");
}

function selCat(c) {
  catSel = c;
  render();
}

function getFiltered() {
  const q = document.getElementById("search").value.toLowerCase().trim();
  return productos.filter(p => {
    const matchCat = catSel === "Todos" || p.cat === catSel;
    const matchQ = !q || p.nombre.toLowerCase().includes(q) || p.sku.toLowerCase().includes(q);
    return matchCat && matchQ;
  });
}

function changeQty(sku, delta) {
  cart[sku] = (cart[sku] || 0) + delta;
  if (cart[sku] <= 0) delete cart[sku];
  render();
}

function toggleReviewPanel() {
  document.getElementById("review-body").classList.toggle("open");
}

function setReviewFilterCat(cat) {
  reviewFilterCat = cat;
  renderReviewPanel();
}

function renderReviewPanel() {
  const sub = document.getElementById("review-sub");
  const filtersEl = document.getElementById("review-filters");
  const listEl = document.getElementById("review-list");

  const items = productos
    .map(p => ({ ...p, motivos: requiereRevisionManual(p) }))
    .filter(p => p.motivos.length > 0);

  sub.textContent = `${items.length} producto${items.length === 1 ? "" : "s"} para revisar`;

  const categoriasRevision = ["TODAS", ...ORDEN_CATEGORIAS.filter(cat => items.some(p => p.cat === cat))];
  if (!categoriasRevision.includes(reviewFilterCat)) reviewFilterCat = "TODAS";

  filtersEl.innerHTML = categoriasRevision.map(cat => `
    <button class="review-filter-btn ${reviewFilterCat === cat ? "active" : ""}" onclick="setReviewFilterCat(${JSON.stringify(cat)})">
      ${escapeHtml(cat)}
    </button>
  `).join("");

  const filtrados = reviewFilterCat === "TODAS"
    ? items
    : items.filter(p => p.cat === reviewFilterCat);

  if (!filtrados.length) {
    listEl.innerHTML = `<div class="review-empty">No hay productos para revisar en esta categoría.</div>`;
    return;
  }

  listEl.innerHTML = filtrados.map(p => `
    <div class="review-item">
      <div class="review-top">
        <div>
          <div class="review-name">${escapeHtml(p.nombre)}</div>
          <div class="review-sku">SKU: ${escapeHtml(p.sku || "-")}</div>
        </div>
        <div class="review-cat">${escapeHtml(p.cat || "OTROS")}</div>
      </div>
      <div class="review-motivos">
        ${p.motivos.map(m => `<span class="review-tag">${escapeHtml(m)}</span>`).join("")}
      </div>
      ${p.nombreOriginal && p.nombreOriginal !== p.nombre ? `
        <div class="review-original"><strong>Original:</strong> ${escapeHtml(p.nombreOriginal)}</div>
      ` : ""}
    </div>
  `).join("");
}

function render() {
  buildCats();

  const filtered = getFiltered();
  const list = document.getElementById("prod-list");
  const resultsMeta = document.getElementById("results-meta");

  resultsMeta.textContent = `${filtered.length} producto${filtered.length === 1 ? "" : "s"}${catSel !== "Todos" ? " en " + catSel : ""}`;

  if (filtered.length === 0) {
    list.innerHTML = `<div class="no-results">No se encontraron productos.</div>`;
  } else {
    list.innerHTML = filtered.map(p => {
      const q = cart[p.sku] || 0;
      const motivos = requiereRevisionManual(p);
      const tieneRevision = motivos.length > 0;

      return `<div class="prod-row${tieneRevision ? " needs-review" : ""}">
        <div class="prod-left">
          <div class="prod-name" title="${escapeHtml(motivos.join(" | "))}">${escapeHtml(p.nombre)}</div>
          <div class="prod-meta">
            <div class="prod-sku">${escapeHtml(p.sku)}</div>
            <div class="prod-tag">${escapeHtml(p.cat)}</div>
            ${tieneRevision ? `<div class="review-dot">Revisar</div>` : ""}
          </div>
        </div>
        <span class="prod-price">${fmt(p.precio)}</span>
        <div class="qty-ctrl">
          <button class="qbtn${q === 0 ? " zero" : ""}" onclick="changeQty(${JSON.stringify(p.sku)}, -1)">−</button>
          <span class="qval">${q}</span>
          <button class="qbtn" onclick="changeQty(${JSON.stringify(p.sku)}, 1)">+</button>
        </div>
      </div>`;
    }).join("");
  }

  const items = Object.entries(cart);
  const totalItems = items.reduce((s, [, q]) => s + q, 0);
  const total = items.reduce((s, [sku, qty]) => {
    const p = productos.find(x => x.sku === sku);
    return s + (p ? p.precio * qty : 0);
  }, 0);

  document.getElementById("cart-label").textContent = totalItems > 0
    ? `${totalItems} prod · ${fmt(total)}`
    : "0 productos";

  const sec = document.getElementById("cart-section");
  const title = document.getElementById("cart-title");

  if (items.length === 0) {
    title.textContent = "";
    sec.innerHTML = `<p class="empty-msg">Todavía no agregaste productos al pedido.</p>`;
    renderReviewPanel();
    return;
  }

  title.textContent = "TU PEDIDO";
  const rows = items.map(([sku, qty]) => {
    const p = productos.find(x => x.sku === sku);
    return `<div class="sum-row"><span class="sum-name">${escapeHtml(p.nombre)} ×${qty}</span><span>${fmt(p.precio * qty)}</span></div>`;
  }).join("");

  sec.innerHTML = `
    <div class="summary">
      ${rows}
      <div class="sum-total"><span>Total</span><span>${fmt(total)}</span></div>
    </div>
    <button class="wpp-btn" onclick="enviarWpp()">
      <svg width="18" height="18" viewBox="0 0 16 16" fill="white">
        <path d="M8 1C4.13 1 1 4.13 1 8c0 1.25.33 2.42.9 3.43L1 15l3.67-.87A7 7 0 108 1zm0 12.6a5.6 5.6 0 01-2.85-.78l-.2-.12-2.18.52.54-2.12-.13-.21A5.6 5.6 0 118 13.6zm3.07-4.17c-.17-.08-1-.49-1.15-.54-.16-.06-.27-.08-.38.08s-.44.54-.54.65c-.1.1-.2.12-.37.04-.17-.08-.72-.27-1.37-.86a5.2 5.2 0 01-.95-1.2c-.1-.17-.01-.26.07-.34.08-.08.17-.2.25-.3.09-.1.12-.17.17-.28.06-.1.03-.2-.01-.28-.05-.08-.38-.92-.52-1.26-.14-.33-.28-.28-.38-.29h-.33c-.1 0-.27.04-.42.2-.14.16-.56.55-.56 1.33s.57 1.54.65 1.65c.08.1 1.12 1.71 2.72 2.4.38.16.68.26.91.33.38.12.73.1 1 .06.31-.05 1-.41 1.14-.8.14-.4.14-.74.1-.81-.05-.07-.16-.11-.33-.19z"/>
      </svg>
      Enviar pedido por WhatsApp
    </button>`;

  renderReviewPanel();
}

function enviarWpp() {
  const items = Object.entries(cart);
  if (items.length === 0) return;

  const total = items.reduce((s, [sku, qty]) => {
    const p = productos.find(x => x.sku === sku);
    return s + (p ? p.precio * qty : 0);
  }, 0);

  let msg = "Hola Motexo! Te paso mi pedido:\n\n";
  items.forEach(([sku, qty]) => {
    const p = productos.find(x => x.sku === sku);
    msg += `• ${p.nombre} (${sku}) ×${qty} — ${fmt(p.precio * qty)}\n`;
  });
  msg += `\n*Total: ${fmt(total)}*`;

  window.open(`https://wa.me/${WPP_NUMERO}?text=${encodeURIComponent(msg)}`, "_blank");
}

function scrollToCart() {
  document.getElementById("cart-section").scrollIntoView({ behavior: "smooth" });
}

render();
</script>

</body>
