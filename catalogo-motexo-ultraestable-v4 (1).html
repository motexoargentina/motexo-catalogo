-3019", "nombre": "SET MANIJAS YAMAHA FZ FI 2.0 FZ 16 MOTEXO INDIA", "precio": 4905.1, "cat": "Otros"}];
const CART = Object.create(null);
let catSel = 'Todos';

function fmt(n) {
  return new Intl.NumberFormat('es-AR', {minimumFractionDigits: 2, maximumFractionDigits: 2}).format(Number(n || 0));
}
function money(n) { return '$' + fmt(n); }
function esc(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
function cats() {
  const seen = new Set();
  const ordered = ['ACEITES','BUJIAS','CORREAS','FILTROS','LAMPARAS','RULEMANES','Otros'];
  const out = ['Todos'];
  ordered.forEach(c => { if (productos.some(p => p.cat === c)) out.push(c); });
  productos.forEach(p => { if (!out.includes(p.cat)) out.push(p.cat); });
  return out;
}
function filtered() {
  const q = document.getElementById('search').value.toLowerCase().trim();
  return productos.filter(p => {
    const okCat = catSel === 'Todos' || p.cat === catSel;
    const okQ = !q || String(p.nombre).toLowerCase().includes(q) || String(p.sku).toLowerCase().includes(q);
    return okCat && okQ;
  });
}
function setCat(cat) { catSel = cat; render(); }
function changeQty(sku, delta) {
  CART[sku] = (CART[sku] || 0) + delta;
  if (CART[sku] <= 0) delete CART[sku];
  render();
}
function buildCats() {
  document.getElementById('cat-pills').innerHTML = cats().map(c =>
    `<button type="button" class="cpill ${c===catSel?'sel':''}" data-cat="${esc(c)}">${esc(c)}</button>`
  ).join('');
}
function renderProducts() {
  const list = document.getElementById('prod-list');
  const arr = filtered();
  if (!arr.length) {
    list.innerHTML = '<div class="no-results">No se encontraron productos</div>';
    return;
  }
  list.innerHTML = arr.map(p => {
    const q = CART[p.sku] || 0;
    return `<div class="prod-row">
      <div class="prod-left">
        <div class="prod-name">${esc(p.nombre)}</div>
        <div class="prod-sku">${esc(p.sku)}</div>
      </div>
      <div class="prod-right">
        <div class="prod-price">${money(p.precio)}</div>
        <div class="qty">
          <button type="button" class="qbtn" data-action="minus" data-sku="${esc(p.sku)}">−</button>
          <span class="qval">${q}</span>
          <button type="button" class="qbtn" data-action="plus" data-sku="${esc(p.sku)}">+</button>
        </div>
      </div>
    </div>`;
  }).join('');
}
function renderCart() {
  const items = Object.entries(CART);
  const totalItems = items.reduce((a,[,q]) => a+q, 0);
  const total = items.reduce((a,[sku,q]) => {
    const p = productos.find(x => x.sku === sku);
    return a + ((p?.precio || 0) * q);
  }, 0);
  document.getElementById('cart-pill').textContent = totalItems ? `${totalItems} prod · ${fmt(total)}` : '0 productos';
  const title = document.getElementById('cart-title');
  const sec = document.getElementById('cart-section');
  if (!items.length) {
    title.textContent = '';
    sec.innerHTML = '<p class="empty-msg">Todavía no agregaste productos al pedido.</p>';
    return;
  }
  title.textContent = 'TU PEDIDO';
  sec.innerHTML = `<div class="summary">${items.map(([sku,qty]) => {
    const p = productos.find(x => x.sku === sku);
    return `<div class="sum-row"><span>${esc(p?.nombre || sku)} ×${qty}</span><span>${money((p?.precio || 0) * qty)}</span></div>`;
  }).join('')}<div class="sum-total"><span>Total</span><span>${money(total)}</span></div></div><button type="button" class="wpp-btn" id="wpp-btn">Enviar pedido por WhatsApp</button>`;
}
function render() { buildCats(); renderProducts(); renderCart(); }
function enviarWpp() {
  const items = Object.entries(CART);
  if (!items.length) return;
  const total = items.reduce((a,[sku,q]) => { const p = productos.find(x => x.sku === sku); return a + ((p?.precio || 0) * q); }, 0);
  let msg = 'Hola Motexo! Te paso mi pedido:

';
  items.forEach(([sku, qty]) => {
    const p = productos.find(x => x.sku === sku);
    msg += `• ${p?.nombre || sku} (${sku}) ×${qty} — ${money((p?.precio || 0) * qty)}
`;
  });
  msg += `
*Total: ${money(total)}*`;
  window.open(`https://wa.me/${WPP_NUMERO}?text=${encodeURIComponent(msg)}`, '_blank');
}

document.addEventListener('click', (e) => {
  const catBtn = e.target.closest('[data-cat]');
  if (catBtn) { setCat(catBtn.getAttribute('data-cat')); return; }
  const qtyBtn = e.target.closest('[data-action][data-sku]');
  if (qtyBtn) { changeQty(qtyBtn.getAttribute('data-sku'), qtyBtn.getAttribute('data-action') === 'plus' ? 1 : -1); return; }
  if (e.target.id === 'cart-pill') { document.getElementById('cart-section').scrollIntoView({behavior:'smooth'}); return; }
  if (e.target.id === 'wpp-btn') { enviarWpp(); return; }
});
document.getElementById('search').addEventListener('input', render);
render();
