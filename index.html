function norm(s) {
  return String(s || "")
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g, "")
    .toUpperCase()
    .trim();
}

function fmt(n) {
  return Number(n || 0).toLocaleString("es-AR", {
    style: "currency",
    currency: "ARS",
    minimumFractionDigits: 2,
    maximumFractionDigits: 2
  });
}

function escapeHtml(str) {
  return String(str || "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#39;");
}

function limpiarNombre(nombre, sku) {
  let n = String(nombre || "").trim();
  const s = String(sku || "").trim();

  n = n.replace(/^[\/&\-\s]+/, "");
  n = n.replace(/\s*\-\s*/g, " ");
  n = n.replace(/\s*\/\s*/g, " / ");
  n = n.replace(/\s+/g, " ").trim();

  if (s) {
    const escapedSku = s.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
    n = n.replace(new RegExp("^" + escapedSku + "\\s*", "i"), "").trim();
  }

  n = n.replace(/^BANDO\s+/i, "CORREA BANDO ");
  n = n.replace(/^BUJIAS NIPO DENSO/i, "BUJIA DENSO");
  n = n.replace(/^BUJIA\s+NGK\s+/i, "BUJIA NGK ");
  n = n.replace(/\bFILTRO ACEITE\b/gi, "FILTRO DE ACEITE");
  n = n.replace(/\bFILTRO AIRE\b/gi, "FILTRO DE AIRE");
  n = n.replace(/\bJUEGO ESPEJOS\b/gi, "JUEGO DE ESPEJOS");
  n = n.replace(/\bKIT JUNTAS MOTOR COMPLETO\b/gi, "KIT DE JUNTAS MOTOR COMPLETO");
  n = n.replace(/\bKIT PISTON PERNO AROS Y SEGUROS\b/gi, "KIT DE PISTON, PERNO, AROS Y SEGUROS");
  n = n.replace(/\bKIT CILINDRO PISTON Y AROS PERNO Y SEG STD\b/gi, "KIT DE CILINDRO, PISTON, AROS, PERNO Y SEGUROS STD");
  n = n.replace(/\bKIT DISCOS EMBRAGUE\b/gi, "KIT DE DISCOS DE EMBRAGUE");
  n = n.replace(/\bJUEGO DISCOS EMBRAGUE\b/gi, "JUEGO DE DISCOS DE EMBRAGUE");
  n = n.replace(/\bKIT RETENES MOTOR\b/gi, "KIT DE RETENES DE MOTOR");
  n = n.replace(/\bKIT PEDALINES DELANTEROS\b/gi, "KIT DE PEDALINES DELANTEROS");
  n = n.replace(/\bKIT PEDALINES TRASEROS\b/gi, "KIT DE PEDALINES TRASEROS");
  n = n.replace(/\bKIT PISTAS DIRECCION\b/gi, "KIT DE PISTAS DE DIRECCION");
  n = n.replace(/\bFZFI\b/gi, "FZ FI");
  n = n.replace(/\bRX[\s\-]?100\b/gi, "RX 100");
  n = n.replace(/\bROUSER 135 LS\b/gi, "ROUSER 135LS");
  n = n.replace(/\bXR 150\b/gi, "XR150");
  n = n.replace(/\s+/g, " ").trim();
  return n;
}

function detectarCategoria(p) {
  const texto = norm(`${p.sku || ""} ${p.nombre || ""} ${p.cat || ""}`);

  if (texto.includes("ACEITE") || texto.includes("YAMALUBE") || texto.includes("LUBRAX")) return "ACEITES";
  if (texto.includes("BUJIA")) return "BUJIAS";
  if (texto.includes("CABLE")) return "CABLES";
  if (texto.includes("CORREA")) return "CORREAS";
  if (texto.includes("FARO") || texto.includes("LAMPARA")) return "LAMPARAS";
  if (texto.includes("FILTRO")) return "FILTROS";
  if (texto.includes("EMBRAGUE")) return "EMBRAGUE";
  if (texto.includes("ESPEJO")) return "ESPEJOS";
  if (texto.includes("TRANSMISION")) return "TRANSMISION";
  if (texto.includes("PEDALINES")) return "PEDALINES";
  if (texto.includes("DIRECCION")) return "DIRECCION";
  if (texto.includes("KIT JUNTAS")) return "KIT JUNTAS";
  if (texto.includes("KIT PISTON")) return "KIT PISTON";
  if (texto.includes("KIT CILINDRO")) return "KIT CILINDRO";
  if (texto.includes("RULEMAN")) return "RULEMANES";
  if (texto.includes("MANIJA") || texto.includes("MANIJAS")) return "MANIJAS";
  if (texto.includes("RETEN")) return "RETENES";
  if (texto.includes("VALVULA")) return "VALVULAS";

  const c = norm(p.cat);
  if (c === "CORREAS") return "CORREAS";
  if (c === "ACEITES") return "ACEITES";
  if (c === "LAMPARAS") return "LAMPARAS";
  if (c === "BUJIAS") return "BUJIAS";
  if (c === "RULEMANES") return "RULEMANES";

  return "OTROS";
}

function prepararProductos() {
  productos = productosRaw.map(p => {
    const nombre = limpiarNombre(p.nombre, p.sku);
    const cat = detectarCategoria({...p, nombre});
    return {
      ...p,
      nombre,
      cat
    };
  });

  const presentes = new Set(productos.map(p => p.cat));
  cats = ["Todos", ...CATEGORY_ORDER.filter(c => presentes.has(c))];
}

function buildCats() {
  document.getElementById("cat-pills").innerHTML = cats.map(c =>
    `<div class="cpill${c === catSel ? " sel" : ""}" onclick="selCat(${JSON.stringify(c)})">${escapeHtml(c)}</div>`
  ).join("");
}

function selCat(c) {
  catSel = c;
  render();
}

function getFiltered() {
  const q = document.getElementById("search").value.toLowerCase().trim();
  return productos.filter(p => {
    const matchCat = catSel === "Todos" || p.cat === catSel;
    const matchQ = !q || p.nombre.toLowerCase().includes(q) || String(p.sku || "").toLowerCase().includes(q);
    return matchCat && matchQ;
  });
}

function changeQty(sku, delta) {
  cart[sku] = (cart[sku] || 0) + delta;
  if (cart[sku] <= 0) delete cart[sku];
  render();
}

function getProductBySku(sku) {
  return productos.find(p => p.sku === sku);
}

function renderList(filtered) {
  const list = document.getElementById("prod-list");
  if (!filtered.length) {
    list.innerHTML = `<div class="no-results">No se encontraron productos</div>`;
    return;
  }

  list.innerHTML = filtered.map(p => {
    const q = cart[p.sku] || 0;
    return `
      <div class="prod-row">
        <div class="prod-left">
          <div class="prod-name">${escapeHtml(p.nombre)}</div>
          <div class="prod-sku">${escapeHtml(p.sku)}</div>
        </div>
        <span class="prod-price">${fmt(p.precio)}</span>
        <div class="qty-ctrl">
          <button type="button" class="qbtn${q === 0 ? " zero" : ""}" onclick="changeQty(${JSON.stringify(p.sku)}, -1)">−</button>
          <span class="qval">${q}</span>
          <button type="button" class="qbtn" onclick="changeQty(${JSON.stringify(p.sku)}, 1)">+</button>
        </div>
      </div>
    `;
  }).join("");
}

function renderMeta(filtered) {
  const meta = document.getElementById("meta-bar");
  const total = filtered.length;
  if (catSel === "Todos") {
    meta.textContent = `${total} producto${total === 1 ? "" : "s"}`;
  } else {
    meta.textContent = `${catSel} · ${total} producto${total === 1 ? "" : "s"}`;
  }
}

function renderCart() {
  const items = Object.entries(cart);
  const totalItems = items.reduce((s, [, q]) => s + q, 0);
  const total = items.reduce((s, [sku, qty]) => {
    const p = getProductBySku(sku);
    return s + (p ? p.precio * qty : 0);
  }, 0);

  document.getElementById("cart-label").textContent = totalItems > 0
    ? `${totalItems} prod · ${fmt(total)}`
    : "0 productos";

  const sec = document.getElementById("cart-section");
  const title = document.getElementById("cart-title");

  if (!items.length) {
    title.textContent = "";
    sec.innerHTML = `<p class="empty-msg">Todavía no agregaste productos al pedido.</p>`;
    return;
  }

  title.textContent = "TU PEDIDO";
  const rows = items.map(([sku, qty]) => {
    const p = getProductBySku(sku);
    if (!p) return "";
    return `<div class="sum-row"><span class="sum-name">${escapeHtml(p.nombre)} ×${qty}</span><span>${fmt(p.precio * qty)}</span></div>`;
  }).join("");

  sec.innerHTML = `
    <div class="summary">
      ${rows}
      <div class="sum-total"><span>Total</span><span>${fmt(total)}</span></div>
    </div>
    <button type="button" class="wpp-btn" onclick="enviarWpp()">
      <svg width="18" height="18" viewBox="0 0 16 16" fill="white" aria-hidden="true">
        <path d="M8 1C4.13 1 1 4.13 1 8c0 1.25.33 2.42.9 3.43L1 15l3.67-.87A7 7 0 108 1zm0 12.6a5.6 5.6 0 01-2.85-.78l-.2-.12-2.18.52.54-2.12-.13-.21A5.6 5.6 0 118 13.6zm3.07-4.17c-.17-.08-1-.49-1.15-.54-.16-.06-.27-.08-.38.08s-.44.54-.54.65c-.1.1-.2.12-.37.04-.17-.08-.72-.27-1.37-.86a5.2 5.2 0 01-.95-1.2c-.1-.17-.01-.26.07-.34.08-.08.17-.2.25-.3.09-.1.12-.17.17-.28.06-.1.03-.2-.01-.28-.05-.08-.38-.92-.52-1.26-.14-.33-.28-.28-.38-.29h-.33c-.1 0-.27.04-.42.2-.14.16-.56.55-.56 1.33s.57 1.54.65 1.65c.08.1 1.12 1.71 2.72 2.4.38.16.68.26.91.33.38.12.73.1 1 .06.31-.05 1-.41 1.14-.8.14-.4.14-.74.1-.81-.05-.07-.16-.11-.33-.19z"/>
      </svg>
      Enviar pedido por WhatsApp
    </button>
  `;
}

function render() {
  const filtered = getFiltered();
  buildCats();
  renderMeta(filtered);
  renderList(filtered);
  renderCart();
}

function enviarWpp() {
  const items = Object.entries(cart);
  if (!items.length) return;

  const total = items.reduce((s, [sku, qty]) => {
    const p = getProductBySku(sku);
    return s + (p ? p.precio * qty : 0);
  }, 0);

  let msg = "Hola Motexo! Te paso mi pedido:%0A%0A";
  items.forEach(([sku, qty]) => {
    const p = getProductBySku(sku);
    if (!p) return;
    msg += `• ${p.nombre} (${sku}) ×${qty} — ${fmt(p.precio * qty)}%0A`;
  });
  msg += `%0A*Total: ${fmt(total)}*`;

  window.open(`https://wa.me/${WPP_NUMERO}?text=${msg}`, "_blank");
}

function scrollToCart() {
  document.getElementById("cart-section").scrollIntoView({ behavior: "smooth", block: "start" });
}

prepararProductos();
render();
</script>

</body>
</html>
