<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Motexo Repuestos — Catálogo</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:#f5f5f5; --card:#fff; --line:#e5e5e5; --text:#111; --muted:#777; --soft:#999; --brand:#e63000; --green:#25D366;
}
body { font-family: -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; background:var(--bg); color:var(--text); }
.top { background:#fff; padding:14px 16px; border-bottom:1px solid var(--line); display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:30; }
.logo { font-size:16px; font-weight:700; letter-spacing:.5px; }
.logo span { color:var(--brand); }
.cart-pill { display:flex; align-items:center; gap:6px; padding:8px 14px; border:1px solid #ddd; border-radius:999px; cursor:pointer; font-size:13px; background:#fff; white-space:nowrap; }
.search-wrap { background:#fff; padding:12px 16px; border-bottom:1px solid var(--line); }
.search-wrap input { width:100%; padding:12px 14px; font-size:14px; border:1px solid #ddd; border-radius:12px; outline:none; background:#fafafa; }
.cat-pills { display:flex; gap:8px; padding:10px 16px; overflow-x:auto; background:#fff; border-bottom:1px solid var(--line); position:sticky; top:58px; z-index:20; }
.cat-pills::-webkit-scrollbar { display:none; }
.cpill { padding:7px 14px; border-radius:999px; font-size:12px; border:1px solid #ddd; color:#666; cursor:pointer; white-space:nowrap; background:#fff; }
.cpill.sel { border-color:#111; color:#111; background:#f2f2f2; font-weight:600; }
.results-meta { padding:12px 16px 0; font-size:12px; color:var(--muted); }
.prod-list { padding:12px 16px; display:flex; flex-direction:column; gap:8px; }
.prod-row { display:flex; align-items:center; justify-content:space-between; padding:12px 14px; border:1px solid var(--line); border-radius:12px; background:#fff; gap:10px; }
.prod-left { flex:1; min-width:0; }
.prod-name { font-size:13px; font-weight:600; line-height:1.35; }
.prod-meta { display:flex; gap:8px; flex-wrap:wrap; margin-top:4px; align-items:center; }
.prod-sku { font-size:11px; color:var(--soft); }
.prod-tag { font-size:10px; color:#555; border:1px solid #e1e1e1; padding:3px 7px; border-radius:999px; background:#fafafa; }
.prod-price { font-size:13px; font-weight:700; white-space:nowrap; }
.qty-ctrl { display:flex; align-items:center; gap:6px; }
.qbtn { width:30px; height:30px; border-radius:8px; border:1px solid #ddd; background:#fff; font-size:16px; cursor:pointer; display:flex; align-items:center; justify-content:center; color:#111; }
.qbtn.zero { opacity:.35; }
.qval { font-size:13px; min-width:20px; text-align:center; font-weight:600; }
.section-label { font-size:11px; color:var(--soft); letter-spacing:1px; padding:12px 16px 4px; }
.cart-section { padding:0 16px 28px; }
.summary { background:#fff; border:1px solid var(--line); border-radius:12px; padding:14px; margin-bottom:10px; }
.sum-row { display:flex; justify-content:space-between; gap:10px; font-size:13px; color:#555; padding:5px 0; }
.sum-name { max-width:75%; }
.sum-total { display:flex; justify-content:space-between; font-size:15px; font-weight:700; padding-top:10px; margin-top:6px; border-top:1px solid #eee; }
.empty-msg,.no-results { background:#fff; border:1px solid var(--line); border-radius:12px; padding:16px; color:var(--muted); font-size:13px; }
.no-results { text-align:center; padding:28px 16px; }
.wpp-btn { width:100%; padding:15px; border-radius:12px; background:var(--green); color:#fff; border:none; cursor:pointer; font-size:15px; font-weight:700; display:flex; align-items:center; justify-content:center; gap:8px; }
</style>
</head>
<body>

<div class="top">
  <div class="logo">MOTEXO <span>REPUESTOS</span></div>
  <div class="cart-pill" id="cart-pill">🛒 <span id="cart-label">0 productos</span></div>
</div>

<div class="search-wrap">
  <input id="search" placeholder="Buscar por nombre o SKU...">
</div>

<div class="cat-pills" id="cat-pills"></div>
<div class="results-meta" id="results-meta"></div>
<div class="prod-list" id="prod-list"></div>

<div class="section-label" id="cart-title">CARRITO</div>

<!-- INPUTS CLIENTE -->
<div style="padding: 10px 16px;">
  <input id="cliente-nombre" placeholder="Nombre o empresa *" style="width:100%; padding:10px; margin-bottom:8px; border:1px solid #ddd; border-radius:10px;">
  <input id="cliente-cuit" placeholder="CUIT (opcional)" style="width:100%; padding:10px; border:1px solid #ddd; border-radius:10px;">
</div>

<div class="cart-section" id="cart-section"></div>

<script>

/* TODO IGUAL — SOLO CAMBIO sendWhatsApp */

function sendWhatsApp() {
  const items = productos.filter(p => carrito[p.sku]);
  if (!items.length) return;

  const nombre = document.getElementById('cliente-nombre').value.trim();
  const cuit = document.getElementById('cliente-cuit').value.trim();

  if (!nombre) {
    alert('Completá el nombre o empresa');
    return;
  }

  let mensaje = 'Hola, quiero pedir:%0A%0A';
  mensaje += `Cliente: ${encodeURIComponent(nombre)}%0A`;

  if (cuit) {
    mensaje += `CUIT: ${encodeURIComponent(cuit)}%0A`;
  }

  mensaje += `%0A`;

  items.forEach(p => {
    mensaje += `${carrito[p.sku]}x ${encodeURIComponent(p.nombre)} (${encodeURIComponent(p.sku)})%0A`;
  });

  mensaje += `%0ATotal: ${encodeURIComponent(formatPrice(totalMonto()))}`;

  window.open(`https://wa.me/${WPP_NUMERO}?text=${mensaje}`, '_blank');
}

</script>

</body>
</html>
