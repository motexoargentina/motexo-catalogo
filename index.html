<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Motexo Repuestos</title>

<style>
body { font-family: Arial; background:#f5f5f5; margin:0; }
.top { padding:15px; background:#fff; display:flex; justify-content:space-between; }
.cat-pills { display:flex; gap:8px; padding:10px; background:#fff; overflow:auto; }
.cpill { padding:6px 12px; border:1px solid #ccc; border-radius:20px; cursor:pointer; }
.sel { background:#000; color:#fff; }
.prod-row { display:flex; justify-content:space-between; padding:10px; border-bottom:1px solid #ddd; background:#fff; }
button { cursor:pointer; }
</style>

</head>
<body>

<div class="top">
  <b>MOTEXO</b>
  <div id="cart-label">0 productos</div>
</div>

<input id="search" placeholder="Buscar..." oninput="render()" style="width:100%;padding:10px;">

<div id="cat-pills" class="cat-pills"></div>
<div id="prod-list"></div>
<div id="cart-section"></div>

<script>

// =====================
// CONFIG
// =====================
const WPP_NUMERO = "5491140347033";

// =====================
// PRODUCTOS
// =====================
let productos = [
{sku:"835X20X30",nombre:"CORREA BANDO 835X20X30",precio:35970,cat:"CORREAS"},
{sku:"BPR5ES",nombre:"BUJIA NGK BPR5ES",precio:6409,cat:"BUJIAS"},
{sku:"12CIR",nombre:"FARO LED 12W",precio:21039,cat:"LAMPARAS"},
{sku:"90793AR40300",nombre:"ACEITE YAMALUBE",precio:9557,cat:"ACEITES"}
];

// =====================
// ESTADO
// =====================
let carrito = {};
let categoriaActiva = "TODOS";

// =====================
// CATEGORIAS
// =====================
function renderCategorias(){
  const cats = ["TODOS"];
  productos.forEach(p=>{
    if(!cats.includes(p.cat)) cats.push(p.cat);
  });

  const cont = document.getElementById("cat-pills");

  cont.innerHTML = "";

  cats.forEach(c=>{
    const div = document.createElement("div");
    div.className = "cpill " + (c===categoriaActiva ? "sel":"");
    div.innerText = c;
    div.onclick = function(){
      categoriaActiva = c;
      render();
    };
    cont.appendChild(div);
  });
}

// =====================
// RENDER
// =====================
function render(){

  const txt = document.getElementById("search").value.toLowerCase();

  const cont = document.getElementById("prod-list");
  cont.innerHTML = "";

  productos.forEach(p=>{

    if(categoriaActiva !== "TODOS" && p.cat !== categoriaActiva) return;

    if(!p.nombre.toLowerCase().includes(txt) && !p.sku.toLowerCase().includes(txt)) return;

    const row = document.createElement("div");
    row.className = "prod-row";

    const cant = carrito[p.sku] || 0;

    row.innerHTML = `
      <div>
        <div>${p.nombre}</div>
        <small>${p.sku}</small>
      </div>

      <div>$${p.precio}</div>

      <div>
        <button onclick="menos('${p.sku}')">-</button>
        ${cant}
        <button onclick="mas('${p.sku}')">+</button>
      </div>
    `;

    cont.appendChild(row);

  });

  renderCart();
}

// =====================
// CARRITO
// =====================
function mas(sku){
  carrito[sku] = (carrito[sku]||0)+1;
  render();
}

function menos(sku){
  if(!carrito[sku]) return;
  carrito[sku]--;
  if(carrito[sku]<=0) delete carrito[sku];
  render();
}

// =====================
// CART
// =====================
function renderCart(){

  const cont = document.getElementById("cart-section");

  let texto = "Hola, quiero pedir:\n";
  let total = 0;
  let html = "";

  for(let sku in carrito){

    const p = productos.find(x=>x.sku===sku);
    const cant = carrito[sku];

    total += p.precio * cant;

    texto += `${cant}x ${p.nombre}\n`;
    html += `<div>${cant}x ${p.nombre}</div>`;
  }

  if(!html){
    cont.innerHTML = "Carrito vacío";
    document.getElementById("cart-label").innerText = "0 productos";
    return;
  }

  texto += `Total: $${total}`;

  document.getElementById("cart-label").innerText = Object.keys(carrito).length + " productos";

  cont.innerHTML = `
    ${html}
    <br><b>Total: $${total}</b>
    <br><br>
    <button onclick="window.open('https://wa.me/${WPP_NUMERO}?text=${encodeURIComponent(texto)}')">
      Pedir por WhatsApp
    </button>
  `;
}

// =====================
// INIT
// =====================
renderCategorias();
render();

</script>

</body>
</html>
