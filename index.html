  .qbtn { width: 28px; height: 28px; border-radius: 7px; border: 1px solid #ddd; background: #fff; font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; color: #111; }

  .qbtn.zero { opacity: 0.3; }

  .expand-hint { font-size: 11px; color: #b0b0b0; margin-top: 4px; }

  .summary { background: #fff; border: 1px solid #e5e5e5; border-radius: 12px; padding: 14px; margin-bottom: 10px; }

  .empty-msg { font-size: 13px; color: #aaa; padding: 8px 0 16px; }

  if (a === "Todas") return -1;
  if (b === "Todas") return 1;
  return a.localeCompare(b, 'es', {sensitivity:'base'});
});

function fmt(n) {
  return "$" + Math.round(Number(n)).toLocaleString("es-AR");
}

function escapeHtml(str) {
  return String(str || '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

function buildBrands() {
  document.getElementById("brand-pills").innerHTML = brands.map(b =>
    `<div class="bpill${b === brandSel ? " sel" : ""}" onclick="selBrand('${escapeHtml(b)}')">${escapeHtml(b)}</div>`
  ).join("");
}

function selBrand(b) {
  brandSel = b;
  render();
}


function cleanDesc(desc, fallback = "") {
  const text = (desc || "").toString().trim();
  if (!text) return fallback || "";
  let cleaned = text
    .replace(/^\s*[A-Z]\d{2}(?:-\d{2}){2,}(?:-[A-Z]\d+)?\s*/i, '')
    .replace(/^\s*[A-Z]{1,3}\d{2}(?:-\d{2}){1,}(?:-[A-Z]\d+)?\s*/i, '')
    .replace(/\s{2,}/g, ' ')
    .trim();
  return cleaned || fallback || "";
}


function normText(text) {
  return String(text || '')
    .toLowerCase()
    .normalize('NFD')
    .replace(/[̀-ͯ]/g, '')
    .replace(/[^a-z0-9]+/g, ' ')
    .trim();
}

function extractAplicacion(p) {

  app = app.replace(new RegExp('^' + nameEsc + '\\s*[-–:|,/]*\\s*', 'i'), '').trim();
  app = app.replace(/^(MIRRORS?\s+SET\s+L\s*\+\s*H\s*)/i, '').trim();
  app = app.replace(/^(MIRRORS?\s+SET\s*)/i, '').trim();
  app = app.replace(/^(SET\s+L\s*\+\s*H\s*)/i, '').trim();
  app = app.replace(/^(JUEGO\s+ESPEJOS\s*)/i, '').trim();
  app = app.replace(/^[-–:|,/]+\s*/, '').trim();
  app = app.replace(/\s+/g, ' ').trim();

  if (!app) return '';
  const appNorm = normText(app);
  if (!appNorm || appNorm === nameNorm || nameNorm.includes(appNorm)) return '';
  if (nameNorm && appNorm.includes(nameNorm) && appNorm.split(' ').length <= nameNorm.split(' ').length + 1) return '';

  const genericNames = [
    'juego espejos', 'espejo', 'filtro de aire', 'filtro de aceite', 'filtro de nafta',
    'manija', 'manigueta', 'pastillas de freno', 'pastilla de freno', 'kit transmision',
    'kit reparacion', 'corona', 'puno', 'punos', 'cable acelerador', 'cable embrague'
  ];
  const isGeneric = genericNames.some(g => nameNorm.startsWith(g) || nameNorm === g);
  const hasModelHint = /(fz|fzs|fzfi|fazer|xtz|ybr|ns|rs|dominar|pulsar|duke|adv|himalayan|gixxer|wave|biz|xr|cg|cb|gn|ray\s?z|versys|z400|nmax|mt\-?03|r3|unicorn|sz|szr|hero|apache)/i.test(app);
  const hasDigits = /\d/.test(app);

  return (isGeneric || hasModelHint || hasDigits) ? app : '';
}

function getFiltered() {
  const q = document.getElementById("search").value.toLowerCase().trim();
  return productos.filter(p => {
    const matchBrand = brandSel === "Todas" || p.marca === brandSel;
    const matchQ = !q || p.nombre.toLowerCase().includes(q) || p.sku.toLowerCase().includes(q) || cleanDesc(p.desc, p.nombre).toLowerCase().includes(q);
    return matchBrand && matchQ;
  });
}

function toggleDetails(sku) {
  openSku = openSku === sku ? null : sku;
  render(false);
}

function changeQty(sku, delta) {
  cart[sku] = (cart[sku] || 0) + delta;
  if (cart[sku] <= 0) delete cart[sku];
  render(false);
}

function render(resetScroll = true) {
  buildBrands();
  const filtered = getFiltered();
  const list = document.getElementById("prod-list");

  if (filtered.length === 0) {
    list.innerHTML = `<div class="no-results">No se encontraron productos</div>`;
  } else {
    list.innerHTML = filtered.map(p => {
      const q = cart[p.sku] || 0;
      const isOpen = openSku === p.sku;
      return `<div class="prod-card">
        <div class="prod-row" onclick="toggleDetails('${escapeHtml(p.sku)}')">
          <div class="prod-left">
            <div class="prod-name">${escapeHtml(p.nombre)}</div>
            ${extractAplicacion(p) ? `<div class="prod-app">Aplica: ${escapeHtml(extractAplicacion(p))}</div>` : ''}
            <div class="prod-meta">${escapeHtml(p.sku)} · ${escapeHtml(p.marca || 'Otros')}</div>
            <div class="expand-hint">${isOpen ? 'Ocultar detalle' : 'Ver detalle'}</div>
          </div>
          <span class="prod-price">${fmt(p.precio)}</span>
        </div>
        <div class="detail-wrap${isOpen ? ' open' : ''}">
          <div class="detail-grid">
            <div>
              <div class="detail-label">Descripción</div>
              <div class="detail-value">${escapeHtml(cleanDesc(p.desc, p.nombre))}</div>
            </div>
            ${extractAplicacion(p) ? `<div><div class="detail-label">Aplica a</div><div class="detail-value">${escapeHtml(extractAplicacion(p))}</div></div>` : ''}
            <div class="detail-badges">
              <span class="mini-badge">${escapeHtml(p.marca || 'Otros')}</span>
              <span class="mini-badge">${escapeHtml(p.cat || 'Otros')}</span>
              <span class="mini-badge">${escapeHtml(p.sku)}</span>
            </div>
            <div class="qty-ctrl" onclick="event.stopPropagation()">
              <button class="qbtn${q === 0 ? " zero" : ""}" onclick="changeQty('${escapeHtml(p.sku)}', -1)">−</button>
              <span class="qval">${q}</span>
              <button class="qbtn" onclick="changeQty('${escapeHtml(p.sku)}', 1)">+</button>
            </div>
          </div>
        </div>
      </div>`;
    }).join("");
  }

  const items = Object.entries(cart);
  const totalItems = items.reduce((s, [, q]) => s + q, 0);
  const total = items.reduce((s, [sku, qty]) => {
    const p = productos.find(x => x.sku === sku);
    return s + (p ? p.precio * qty : 0);
  }, 0);

  document.getElementById("cart-label").innerHTML = totalItems > 0
    ? `${totalItems} prod · ${fmt(total)}`
    : "0 productos";

  const sec = document.getElementById("cart-section");
  const title = document.getElementById("cart-title");

  if (items.length === 0) {
    title.textContent = "";
    sec.innerHTML = `<p class="empty-msg">Todavía no agregaste productos al pedido.</p>`;
    return;
  }

  title.textContent = "TU PEDIDO";
  const rows = items.map(([sku, qty]) => {
    const p = productos.find(x => x.sku === sku);
    return `<div class="sum-row"><span>${escapeHtml(p.nombre)} ×${qty}</span><span>${fmt(p.precio * qty)}</span></div>`;
  }).join("");

  sec.innerHTML = `
    <div class="summary">
      ${rows}
      <div class="sum-total"><span>Total</span><span>${fmt(total)}</span></div>
    </div>
    <button class="wpp-btn" onclick="enviarWpp()">
      <svg width="18" height="18" viewBox="0 0 16 16" fill="white">
        <path d="M8 1C4.13 1 1 4.13 1 8c0 1.25.33 2.42.9 3.43L1 15l3.67-.87A7 7 0 108 1zm0 12.6a5.6 5.6 0 01-2.85-.78l-.2-.12-2.18.52.54-2.12-.13-.21A5.6 5.6 0 118 13.6zm3.07-4.17c-.17-.08-1-.49-1.15-.54-.16-.06-.27-.08-.38.08s-.44.54-.54.65c-.1.1-.2.12-.37.04-.17-.08-.72-.27-1.37-.86a5.2 5.2 0 01-.95-1.2c-.1-.17-.01-.26.07-.34.08-.08.17-.2.25-.3.09-.1.12-.17.17-.28.06-.1.03-.2-.01-.28-.05-.08-.38-.92-.52-1.26-.14-.33-.28-.28-.38-.29h-.33c-.1 0-.27.04-.42.2-.14.16-.56.55-.56 1.33s.57 1.54.65 1.65c.08.1 1.12 1.71 2.72 2.4.38.16.68.26.91.33.38.12.73.1 1 .06.31-.05 1-.41 1.14-.8.14-.4.14-.74.1-.81-.05-.07-.16-.11-.33-.19z"/>
      </svg>
      Enviar pedido por WhatsApp
    </button>`;
}

function enviarWpp() {
  const items = Object.entries(cart);
  const total = items.reduce((s, [sku, qty]) => {
    const p = productos.find(x => x.sku === sku);
    return s + (p ? p.precio * qty : 0);
  }, 0);

  let msg = "Hola Motexo! Te paso mi pedido:\n\n";
  items.forEach(([sku, qty]) => {
    const p = productos.find(x => x.sku === sku);
    msg += `• ${p.nombre} (${sku}) ×${qty} — ${fmt(p.precio * qty)}\n`;
  });
  msg += `\n*Total: ${fmt(total)}*`;

  window.open(`https://wa.me/${WPP_NUMERO}?text=${encodeURIComponent(msg)}`, "_blank");
}

function scrollToCart() {
  document.getElementById("cart-section").scrollIntoView({ behavior: "smooth" });
}

render();
</script>
