<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:#f5f5f5; --card:#fff; --line:#e5e5e5; --text:#111; --muted:#777; --soft:#999; --brand:#e63000; --green:#25D366;
}
body { font-family: -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; background:var(--bg); color:var(--text); }
.top { background:#fff; padding:14px 16px; border-bottom:1px solid var(--line); display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:30; }
.logo { font-size:16px; font-weight:700; letter-spacing:.5px; }
.logo span { color:var(--brand); }
.cart-pill { display:flex; align-items:center; gap:6px; padding:8px 14px; border:1px solid #ddd; border-radius:999px; cursor:pointer; font-size:13px; background:#fff; white-space:nowrap; }
.search-wrap { background:#fff; padding:12px 16px; border-bottom:1px solid var(--line); }
.search-wrap input { width:100%; padding:12px 14px; font-size:14px; border:1px solid #ddd; border-radius:12px; outline:none; background:#fafafa; }
.cat-pills { display:flex; gap:8px; padding:10px 16px; overflow-x:auto; background:#fff; border-bottom:1px solid var(--line); position:sticky; top:58px; z-index:20; }
.cat-pills::-webkit-scrollbar { display:none; }
.cpill { padding:7px 14px; border-radius:999px; font-size:12px; border:1px solid #ddd; color:#666; cursor:pointer; white-space:nowrap; background:#fff; }
.cpill.sel { border-color:#111; color:#111; background:#f2f2f2; font-weight:600; }
.results-meta { padding:12px 16px 0; font-size:12px; color:var(--muted); }
.prod-list { padding:12px 16px; display:flex; flex-direction:column; gap:8px; }
.prod-row { display:flex; align-items:center; justify-content:space-between; padding:12px 14px; border:1px solid var(--line); border-radius:12px; background:#fff; gap:10px; }
.prod-left { flex:1; min-width:0; }
.prod-name { font-size:13px; font-weight:600; line-height:1.35; }
.prod-meta { display:flex; gap:8px; flex-wrap:wrap; margin-top:4px; align-items:center; }
.prod-sku { font-size:11px; color:var(--soft); }
.prod-tag { font-size:10px; color:#555; border:1px solid #e1e1e1; padding:3px 7px; border-radius:999px; background:#fafafa; }
.prod-price { font-size:13px; font-weight:700; white-space:nowrap; }
.qty-ctrl { display:flex; align-items:center; gap:6px; }
.qbtn { width:30px; height:30px; border-radius:8px; border:1px solid #ddd; background:#fff; font-size:16px; cursor:pointer; display:flex; align-items:center; justify-content:center; color:#111; }
.qbtn.zero { opacity:.35; }
.qval { font-size:13px; min-width:20px; text-align:center; font-weight:600; }
.section-label { font-size:11px; color:var(--soft); letter-spacing:1px; padding:12px 16px 4px; }
.cart-section { padding:0 16px 28px; }
.summary { background:#fff; border:1px solid var(--line); border-radius:12px; padding:14px; margin-bottom:10px; }
.sum-row { display:flex; justify-content:space-between; gap:10px; font-size:13px; color:#555; padding:5px 0; }
.sum-name { max-width:75%; }
.sum-total { display:flex; justify-content:space-between; font-size:15px; font-weight:700; padding-top:10px; margin-top:6px; border-top:1px solid #eee; }
.empty-msg,.no-results { background:#fff; border:1px solid var(--line); border-radius:12px; padding:16px; color:var(--muted); font-size:13px; }
.no-results { text-align:center; padding:28px 16px; }
.wpp-btn { width:100%; padding:15px; border-radius:12px; background:var(--green); color:#fff; border:none; cursor:pointer; font-size:15px; font-weight:700; display:flex; align-items:center; justify-content:center; gap:8px; }
@media (max-width:680px) {
  .prod-row { align-items:flex-start; flex-wrap:wrap; }
  .prod-price { order:3; width:100%; margin-top:-4px; }
  .qty-ctrl { margin-left:auto; }
}
</style>

const carrito = {};
let categoriaActiva = 'TODOS';

function normalizarTexto(t) {
  return String(t || '').normalize('NFD').replace(/[\u0300-\u036f]/g, '').toLowerCase().trim();
}

function limpiarNombre(nombre, sku) {
  let n = String(nombre || '').trim();
  n = n.replace(/^[\\/&]+/, '').trim();
  n = n.replace(/^[-–—]+/, '').trim();
  if (n.toUpperCase() === String(sku || '').toUpperCase()) return String(sku || '');
  return n.replace(/\s+/g, ' ');
}

function normalizarCategoria(cat, nombre) {
  const c = normalizarTexto(cat).toUpperCase();
  const n = normalizarTexto(nombre).toUpperCase();
  const text = (c + ' ' + n).trim();

  if (text.includes('ACEITE') && text.includes('FILTRO')) return 'FILTROS';
  if (text.includes('FILTRO')) return 'FILTROS';
  if (text.includes('ACEITE')) return 'ACEITES';
  if (text.includes('BUJIA')) return 'BUJIAS';
  if (text.includes('CORREA')) return 'CORREAS';
  if (text.includes('LAMP') || text.includes('FARO')) return 'LAMPARAS';
  if (text.includes('RULEM')) return 'RULEMANES';
  if (text.includes('CABLE')) return 'CABLES';
  if (text.includes('ESPEJO')) return 'ESPEJOS';
  if (text.includes('MANIJA')) return 'MANIJAS';
  if (text.includes('PEDALIN')) return 'PEDALINES';
  if (text.includes('PISTAS DIRECCION')) return 'DIRECCION';
  if (text.includes('TRANSMISION')) return 'TRANSMISION';
  if (text.includes('RETENES SUSPENSION')) return 'RETENES DE SUSPENSION';
  if (text.includes('RETENES MOTOR')) return 'RETENES DE MOTOR';
  if (text.includes('JUNTAS MOTOR')) return 'JUNTAS DE MOTOR';
  if (text.includes('VALVULAS')) return 'VALVULAS';
  if (text.includes('PISTON') || text.includes('CILINDRO') || text.includes('AROS')) return 'PISTON Y CILINDRO';
  if (text.includes('EMBRAGUE')) return 'EMBRAGUE';
  if (text.includes('KIT')) return 'KITS';

  return (String(cat || 'OTROS').trim().toUpperCase()) || 'OTROS';
}

const productos = productosRaw.map((p, i) => ({
  id: i + 1,
  sku: String(p.sku || '').trim(),
  nombre: limpiarNombre(p.nombre, p.sku),
  precio: Number(p.precio || 0),
  cat: normalizarCategoria(p.cat, p.nombre)
})).filter(p => p.sku && p.nombre);

const ordenCategorias = ['TODOS', 'ACEITES', 'BUJIAS', 'CABLES', 'CORREAS', 'EMBRAGUE', 'ESPEJOS', 'FILTROS', 'JUNTAS DE MOTOR', 'LAMPARAS', 'MANIJAS', 'PEDALINES', 'PISTON Y CILINDRO', 'RETENES DE MOTOR', 'RETENES DE SUSPENSION', 'RULEMANES', 'TRANSMISION', 'DIRECCION', 'VALVULAS', 'KITS', 'OTROS'];
const categoriasUnicas = Array.from(new Set(productos.map(p => p.cat)));
const categorias = ['TODOS', ...categoriasUnicas
  .filter(cat => cat !== 'TODOS')
  .sort((a, b) => {
    const ia = ordenCategorias.indexOf(a);
    const ib = ordenCategorias.indexOf(b);
    if (ia !== -1 && ib !== -1) return ia - ib;
    if (ia !== -1) return -1;
    if (ib !== -1) return 1;
    return a.localeCompare(b, 'es');
  })];

function formatPrice(v) {
  return '$' + Number(v || 0).toLocaleString('es-AR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

function getFilteredProducts() {
  const q = normalizarTexto(document.getElementById('search').value);
  return productos.filter(p => {
    const matchCat = categoriaActiva === 'TODOS' || p.cat === categoriaActiva;
    const text = normalizarTexto(p.nombre + ' ' + p.sku + ' ' + p.cat);
    return matchCat && (!q || text.includes(q));
  });
}

function totalItems() {
  return Object.values(carrito).reduce((a,b) => a + b, 0);
}

function totalMonto() {
  return productos.reduce((sum, p) => sum + ((carrito[p.sku] || 0) * p.precio), 0);
}

function setCategoria(cat) {
  categoriaActiva = cat;
  render();
}

function addItem(sku) {
  carrito[sku] = (carrito[sku] || 0) + 1;
  renderCart();
  renderProductQuantities();
}

function removeItem(sku) {
  if (!carrito[sku]) return;
  carrito[sku] -= 1;
  if (carrito[sku] <= 0) delete carrito[sku];
  renderCart();
  renderProductQuantities();
}

function scrollToCart() {
  document.getElementById('cart-section').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function sendWhatsApp() {
  const items = productos.filter(p => carrito[p.sku]);
  if (!items.length) return;
  let mensaje = 'Hola, quiero pedir:%0A%0A';
  items.forEach(p => {
    mensaje += `${carrito[p.sku]}x ${p.nombre} (${p.sku})%0A`;
  });
  mensaje += `%0ATotal: ${encodeURIComponent(formatPrice(totalMonto()))}`;
  window.open(`https://wa.me/${WPP_NUMERO}?text=${mensaje}`, '_blank');
}

function renderCategorias() {
  const cont = document.getElementById('cat-pills');
  cont.innerHTML = '';
  categorias.forEach(cat => {
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'cpill' + (cat === categoriaActiva ? ' sel' : '');
    btn.textContent = cat;
    btn.addEventListener('click', () => setCategoria(cat));
    cont.appendChild(btn);
  });
}

function cssEscape(value) {
  return String(value).replace(/[^a-zA-Z0-9_-]/g, '_');
}

function renderProducts() {
  const list = document.getElementById('prod-list');
  const meta = document.getElementById('results-meta');
  const filtered = getFilteredProducts();
  meta.textContent = `${filtered.length} producto${filtered.length === 1 ? '' : 's'}`;
  if (!filtered.length) {
    list.innerHTML = '<div class="no-results">No se encontraron productos.</div>';
    return;
  }
  list.innerHTML = filtered.map(p => {
    const qty = carrito[p.sku] || 0;
    return `
      <div class="prod-row">
        <div class="prod-left">
          <div class="prod-name">${p.nombre}</div>
          <div class="prod-meta">
            <span class="prod-sku">${p.sku}</span>
            <span class="prod-tag">${p.cat}</span>
          </div>
        </div>
        <div class="prod-price">${formatPrice(p.precio)}</div>
        <div class="qty-ctrl">
          <button type="button" class="qbtn ${qty === 0 ? 'zero' : ''}" data-action="remove" data-sku="${p.sku}">-</button>
          <span class="qval" id="q-${cssEscape(p.sku)}">${qty}</span>
          <button type="button" class="qbtn" data-action="add" data-sku="${p.sku}">+</button>
        </div>
      </div>`;
  }).join('');
}

function renderProductQuantities() {
  document.getElementById('cart-label').textContent = `${totalItems()} producto${totalItems() === 1 ? '' : 's'}`;
  document.querySelectorAll('[data-action]').forEach(btn => {
    const sku = btn.getAttribute('data-sku');
    const qty = carrito[sku] || 0;
    const q = document.getElementById('q-' + cssEscape(sku));
    if (q) q.textContent = qty;
    if (btn.getAttribute('data-action') === 'remove') btn.classList.toggle('zero', qty === 0);
  });
}

function renderCart() {
  const section = document.getElementById('cart-section');
  const items = productos.filter(p => carrito[p.sku]);
  document.getElementById('cart-label').textContent = `${totalItems()} producto${totalItems() === 1 ? '' : 's'}`;
  if (!items.length) {
    section.innerHTML = '<div class="empty-msg">Todavía no agregaste productos al carrito.</div>';
    return;
  }
  const rows = items.map(p => `
    <div class="sum-row">
      <div class="sum-name">${carrito[p.sku]}x ${p.nombre}</div>
      <div>${formatPrice(carrito[p.sku] * p.precio)}</div>
    </div>`).join('');
  section.innerHTML = `
    <div class="summary">
      ${rows}
      <div class="sum-total">
        <span>Total</span>
        <span>${formatPrice(totalMonto())}</span>
      </div>
    </div>
    <button type="button" class="wpp-btn" id="wpp-btn">Pedir por WhatsApp</button>`;
  document.getElementById('wpp-btn').addEventListener('click', sendWhatsApp);
}

function render() {
  renderCategorias();
  renderProducts();
  renderCart();
}

document.getElementById('search').addEventListener('input', renderProducts);
document.getElementById('search').addEventListener('input', () => {
  const filtered = getFilteredProducts();
  document.getElementById('results-meta').textContent = `${filtered.length} producto${filtered.length === 1 ? '' : 's'}`;
});
document.getElementById('cart-pill').addEventListener('click', scrollToCart);
document.getElementById('prod-list').addEventListener('click', (e) => {
  const btn = e.target.closest('[data-action]');
  if (!btn) return;
  const sku = btn.getAttribute('data-sku');
  if (btn.getAttribute('data-action') === 'add') addItem(sku);
  if (btn.getAttribute('data-action') === 'remove') removeItem(sku);
});

render();
</script>
</body>
</html>
